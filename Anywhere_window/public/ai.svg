<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" shape-rendering="crispEdges">
  <!-- 主体 -->
  <g fill="#000000">
    <!-- 顶部小角 -->
    <rect x="30" y="20" width="20" height="20"/>
    <rect x="110" y="20" width="20" height="20"/>

    <!-- 身体 -->
    <rect x="20" y="40" width="120" height="80"/>

    <!-- 四条腿：更粗更稳定，确保在小尺寸下清晰可见 -->
    <rect x="30"  y="120" width="16" height="25"/>
    <rect x="54"  y="120" width="16" height="25"/>
    <rect x="90"  y="120" width="16" height="25"/>
    <rect x="114" y="120" width="16" height="25"/>
  </g>

  <!-- 五官 -->
  <g fill="#FFFFFF">
    <!-- 眼睛 -->
    <rect x="45" y="60" width="15" height="15"/>
    <rect x="100" y="60" width="15" height="15"/>

    <!-- 嘴巴 -->
    <rect x="70" y="85" width="20" height="8"/>
  </g>
</svg>